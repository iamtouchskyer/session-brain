<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Session Brain — AI Session Articles</title>
    <meta property="og:title" content="Session Brain — AI Session Articles" />
    <meta property="og:description" content="Curated articles generated from AI coding sessions, organized by project." />
    <meta property="og:image" content="/favicon.svg" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary" />
  </head>
  <body>
    <script>
      // Prevent FOUC: set theme before render
      (function() {
        var t = localStorage.getItem('session-brain-theme');
        if (!t) t = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', t);
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
